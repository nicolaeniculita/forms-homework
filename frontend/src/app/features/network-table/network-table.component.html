<mat-card class="network-page">
  <mat-card-header>
    <mat-card-title>Network</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <table mat-table [dataSource]="users" class="table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>

        <td mat-cell *matCellDef="let user">
          <div class="name-cell">
            <app-avatar [firstName]="user.firstName" [lastName]="user.lastName"> </app-avatar>

            <span class="full-name"> {{ user.firstName }} {{ user.lastName }} </span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="headline">
        <th mat-header-cell *matHeaderCellDef>Headline</th>

        <td mat-cell *matCellDef="let user">
          {{ user.headline }}
        </td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Location</th>

        <td mat-cell *matCellDef="let user">
          {{ user.location }}
        </td>
      </ng-container>

      <ng-container matColumnDef="connections">
        <th mat-header-cell *matHeaderCellDef>Connections</th>

        <td mat-cell *matCellDef="let user">
          {{ user.connections }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        class="table-row"
        (click)="openProfile(row)"
      ></tr>
    </table>
  </mat-card-content>
</mat-card>
